// Plugins
plugins {

  // Apply the java-library plugin for API and implementation separation.
  id "java-library"

  // To publish to maven
  // https://github.com/vanniktech/gradle-maven-publish-plugin
  id "com.vanniktech.maven.publish" version "0.36.0"

}


// Project info
project.version = "2.0.0"
project.group = "com.kaderate"

// Project title & description
project.ext.title = "JSONFeed"
project.description = "${project.ext.title} Parser"
project.ext.vendor = "FS Consulting, LLC"
project.ext.buildDate = new Date().format("yyyy-MM-dd-HH:mm:ss")


// Project base
base {
    archivesName = rootProject.name
}


// Tasks
tasks.named("jar") {
  manifest {
    attributes(
        "Build-Date": project.ext.buildDate,
        "Specification-Title": project.description,
        "Specification-Version": project.version,
        "Specification-Vendor": project.ext.vendor,
        "Implementation-Title": project.description,
        "Implementation-Version": project.version,
        "Implementation-Vendor": project.ext.vendor,
    )
  }
}


// Build source and javadoc jars
// java {
//   withSourcesJar()
//   withJavadocJar()
// }


// Java task
compileJava {
  options.compilerArgs << "-Xlint:unchecked"
  options.compilerArgs << "-Xlint:deprecation"
}


// Java test task
compileTestJava {
  options.compilerArgs << "-Xlint:unchecked"
  options.compilerArgs << "-Xlint:deprecation"
}


// Javadoc task
javadoc {
  options.addBooleanOption("Xdoclint:none", true)
}


// Repositories
repositories {

  // Use Maven Central for resolving dependencies
  mavenCentral()

}


// Dependencies
dependencies {

  // This dependency is used internally, and not exposed to consumers on their own compile classpath
  // https://github.com/stleary/JSON-java
  // https://central.sonatype.com/artifact/org.json/json
  implementation "org.json:json:20251224"

  // Use JUnit test framework
  // https://mvnrepository.com/artifact/junit/junit
  testImplementation "junit:junit:4.13.2"

}



// Publishing
//
// https://vanniktech.github.io/gradle-maven-publish-plugin/central
// https://central.sonatype.com/artifact/com.kaderate/jsonfeed
//
mavenPublishing {

  coordinates(project.group, rootProject.name, project.version)

  pom {
    name = project.ext.title
    description = project.description
    inceptionYear = "2020"
    url = "https://github.com/fschiettecatte/jsonfeed"
    licenses {
      license {
        name = "The Apache License, Version 2.0"
        url = "http://www.apache.org/licenses/LICENSE-2.0.txt"
        distribution = "http://www.apache.org/licenses/LICENSE-2.0.txt"
      }
    }
    developers {
      developer {
        id = "fschiettecatte@gmail.com"
        name = "François Schiettecatte"
        url = "https://github.com/fschiettecatte/"
      }
    }
    scm {
      url = "https://github.com/fschiettecatte/jsonfeed/"
      connection = "scm:git:git://github.com/jsonfeed/mylibrary.git"
      developerConnection = "scm:git:ssh://git@github.com/jsonfeed/mylibrary.git"
    }
  }
}


